version: 2
updates:
  - package-ecosystem: "nix"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "nix"
    cooldown:
      default-days: 7
    groups:
      nix:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
